name: llms metadata — schema validation

# Validates that llms metadata YAMLs (per-module + per-package index) conform to
# their JSON Schemas. Only runs on PRs that touch metadata or schema files, and
# only validates the YAMLs that the PR actually changed — unless the schemas
# themselves changed, in which case every YAML is re-validated.

on:
  pull_request:
    paths:
      - '**/llms/**/*.yaml'
      - 'schemas/llms-metadata-v1.json'
      - 'schemas/llms-package-index-v1.json'
      - 'scripts/validate-llms-schema.py'
      - '.github/workflows/llms-schema-validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for `git diff` against base ref

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet pyyaml jsonschema

      - name: Determine affected YAMLs
        id: scope
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

          # Schema change → full re-validation (a stricter schema can retroactively
          # invalidate previously-passing YAMLs; we must catch that on this PR).
          if git diff --name-only "$BASE"...HEAD | grep -qE '^schemas/(llms-metadata-v1|llms-package-index-v1)\.json$'; then
            echo "scope=ALL (schemas changed)"
            find . -type f -name '*.yaml' -path '*/llms/*' | sort > affected.txt
          else
            echo "scope=DIFF"
            git diff --name-only --diff-filter=ACMR "$BASE"...HEAD \
              | grep -E '/llms/.*\.yaml$' \
              | sort > affected.txt || true
          fi

          echo "---affected---"
          cat affected.txt
          count=$(wc -l < affected.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Validate
        if: steps.scope.outputs.count != '0'
        run: |
          xargs -a affected.txt python3 scripts/validate-llms-schema.py

      - name: No YAMLs to validate
        if: steps.scope.outputs.count == '0'
        run: echo "PR touched files in the path filter but no llms YAMLs in the diff. Nothing to validate."
