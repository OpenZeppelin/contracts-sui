name: Move LLM Security Scan (Codex)

on:
  push:
    branches: [main]
    paths:
      - "**/*.move"

permissions:
  contents: read

concurrency:
  group: move-llm-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Move vulnerability scan (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Build file list to scan (Move + Move.toml)
        id: files
        shell: bash
        run: |
          set -euo pipefail
          # Scan only Move sources and Move.toml (per requirements).
          git ls-files '*.move' 'Move.toml' > /tmp/scan_files.txt || true
          count=$(wc -l < /tmp/scan_files.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Files to scan: $count"
          sed -n '1,200p' /tmp/scan_files.txt

      - name: Write strict JSON schema for Codex output
        shell: bash
        run: |
          cat > /tmp/scan_schema.json <<'JSON'
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "additionalProperties": false,
            "required": ["vulnerable", "summary", "scanned_commit", "scanned_files", "findings"],
            "properties": {
              "vulnerable": { "type": "boolean" },
              "summary": { "type": "string", "minLength": 1 },
              "scanned_commit": { "type": "string", "minLength": 7 },
              "scanned_files": {
                "type": "array",
                "items": { "type": "string", "minLength": 1 }
              },
              "findings": {
                "type": "array",
                "items": {
                  "type": "object",
                  "additionalProperties": false,
                  "required": ["severity", "category", "confidence", "file", "line_hint", "title", "description", "recommendation"],
                  "properties": {
                    "severity": { "type": "string", "enum": ["critical", "high", "medium", "low"] },
                    "category": {
                      "type": "string",
                      "enum": [
                        "access_control",
                        "capability_checks",
                        "object_ownership",
                        "shared_object_safety",
                        "transfer_safety",
                        "arithmetic_overflow_underflow",
                        "abort_handling",
                        "dos_gas_storage",
                        "invariant_violation",
                        "dependency_config",
                        "other"
                      ]
                    },
                    "confidence": { "type": "string", "enum": ["high", "medium", "low"] },
                    "file": { "type": "string", "minLength": 1 },
                    "line_hint": { "type": ["string", "null"] },
                    "title": { "type": "string", "minLength": 1 },
                    "description": { "type": "string", "minLength": 1 },
                    "recommendation": { "type": "string", "minLength": 1 }
                  }
                }
              }
            }
          }
          JSON

      - name: Run Codex scan (read-only, non-interactive)
        id: scan
        if: steps.files.outputs.count != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: gpt-5-codex
        shell: bash
        run: |
          set -euo pipefail

          commit="$(git rev-parse HEAD)"
          files="$(sed -e 's/^/- /' /tmp/scan_files.txt)"

          # Codex will validate the final response against /tmp/scan_schema.json and write the last message to /tmp/scan_output.json.
          codex exec \
            --sandbox read-only \
            --ask-for-approval never \
            --ephemeral \
            --model "$CODEX_MODEL" \
            --output-schema /tmp/scan_schema.json \
            --output-last-message /tmp/scan_output.json \
            "You are an expert Sui Move smart contract security auditor.

            SCOPE (MUST FOLLOW):
            - Only analyze the Move codebase and related Move config.
            - Files in scope are EXACTLY the following tracked files:
            $files
            - Treat Move.toml as security-relevant (dependencies, addresses, build settings).

            CONSTRAINTS:
            - Read-only analysis: do NOT propose changes outside recommendations.
            - If you did not inspect a file, do not claim you did.
            - Prefer concrete, code-referential findings (file + line hints).

            TASK:
            1) For each in-scope *.move module, identify vulnerability patterns relevant to Sui Move, including (non-exhaustive):
               - missing/incorrect access control on public(entry) functions
               - improper capability usage or missing capability checks
               - object ownership / UID / ID misuse, unsafe sharing, unsafe transfers
               - shared object invariants, re-entrancy-like patterns via callbacks/hooks where applicable
               - arithmetic, abort/require patterns, and error handling that can lead to invariant breaks
               - DoS via unbounded loops / vector growth / excessive events / storage growth
               - misuse of tx_context or assumptions about sender, timestamps, etc.
               - inconsistent or dangerous patterns around coin handling and transfers
            2) Analyze Move.toml for risky dependency / address configuration issues.
            3) Output ONLY a single JSON object that EXACTLY matches the provided JSON Schema.
               - Set vulnerable=true iff there is at least one finding.
               - scanned_commit MUST be: $commit
               - scanned_files MUST exactly list every file you actually inspected (subset of scope is allowed, but be honest).
               - If you found nothing, findings must be [] and vulnerable=false.

            IMPORTANT:
            - Do not include markdown, backticks, or any extra text—JSON only."

          # Echo the output for logs
          echo "----- Codex last message (JSON) -----"
          cat /tmp/scan_output.json
          echo ""

      - name: Handle empty Move codebase (no files to scan)
        if: steps.files.outputs.count == '0'
        run: |
          echo "No *.move files or Move.toml found in the repository. Skipping scan."
          echo '{"vulnerable":false,"summary":"No Move sources found; nothing to scan.","scanned_commit":"'"$(git rev-parse HEAD)"'","scanned_files":[],"findings":[]}' > /tmp/scan_output.json

      - name: Validate results & fail on any finding
        shell: bash
        run: |
          set -euo pipefail

          # Ensure jq exists (ubuntu-latest usually has it, but be defensive)
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

          raw="$(cat /tmp/scan_output.json | tr -d '\r')"

          if ! echo "$raw" | jq empty 2>/dev/null; then
            echo "ERROR: Could not parse scan output as JSON:"
            echo "$raw"
            exit 2
          fi

          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "MOVE LLM SECURITY SCAN RESULTS"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "Summary: $(echo "$raw" | jq -r '.summary')"
          echo "Commit : $(echo "$raw" | jq -r '.scanned_commit')"
          echo ""

          finding_count="$(echo "$raw" | jq '.findings | length')"
          vulnerable="$(echo "$raw" | jq -r '.vulnerable')"

          if [ "$finding_count" -gt 0 ]; then
            echo "Findings ($finding_count):"
            echo "$raw" | jq -r '
              .findings[]
              | "- [\(.severity | ascii_upcase)] (\(.category), confidence=\(.confidence)) \(.title)\n  file=\(.file) line=\(.line_hint // "unknown")\n  issue=\(.description)\n  fix=\(.recommendation)\n"
            '
          else
            echo "No findings reported."
          fi

          # FAIL ON ANY FINDING (spirit of the prompt), regardless of the vulnerable flag.
          if [ "$finding_count" -gt 0 ] || [ "$vulnerable" = "true" ]; then
            echo "❌ SCAN FAILED — $finding_count finding(s)."
            exit 1
          fi

          echo "✅ SCAN PASSED — No vulnerabilities detected."

      - name: Upload scan output
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: move-llm-security-scan-output
          path: /tmp/scan_output.json
          retention-days: 30
