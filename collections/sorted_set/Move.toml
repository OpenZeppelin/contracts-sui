[package]
name = "openzeppelin_sorted_set"
edition = "2024"

# The Sui framework + MoveStdlib are implicit system dependencies in Move 2024.
# The only explicit dependency is the sibling `openzeppelin_sorted_map` package,
# which this set wraps - `SortedSet<K> = SortedMap<K, Unit>`. The set consumes the
# map's published public surface rather than re-implementing it.
[dependencies]
openzeppelin_sorted_map = { local = "../sorted_map" }

[addresses]
openzeppelin_sorted_set = "0x0"
