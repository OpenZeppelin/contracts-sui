[package]
name = "openzeppelin_big_sorted_map"
edition = "2024"

# The Sui framework + MoveStdlib are implicit system dependencies in Move 2024.
# The only explicit dependency is the sibling `openzeppelin_sorted_map` package: a
# B+Tree node's payload is an unmodified `SortedMap`. This package consumes the map's
# published public surface, including the positional primitives `split_off`/`append`
# added for exactly this purpose.
[dependencies]
openzeppelin_sorted_map = { local = "../sorted_map" }

[addresses]
openzeppelin_big_sorted_map = "0x0"
