    - do_not_id: confusing-wrap-with-convert
      pattern: "`ud30x9::wrap(<integer-literal-without-fractional-bits>)` where the literal looks like a whole-number quantity"
      heuristic: "regex: /ud30x9::wrap\\(\\s*\\d+\\s*\\)/  — flag if the integer is small (< 10^9) and not a recognized raw bit pattern"
    - do_not_id: bitshift-for-decimal-scaling
      pattern: "`<UD30x9>.lshift(k)` or `<UD30x9>.rshift(k)` in a context that names a decimal quantity (`amount`, `price`, `balance`, `fee`)"
      heuristic: "regex: /\\b(amount|price|balance|fee|rate)\\b[^\\n]*\\.(lshift|rshift)\\(/"
    - do_not_id: unchecked-without-proof
      pattern: "`unchecked_(add|sub|lshift|rshift)` without a guarding `assert!` in the surrounding block"
      heuristic: "AST rule: in the function body containing the call, no `assert!` predicate references the operands in a way that bounds them"
    - do_not_id: pow-for-long-compounding
      pattern: "`.pow(exp)` with `exp > ~16` or in a loop / fold over many periods"
      heuristic: "regex: /\\.pow\\(\\s*(\\d+)\\s*\\)/ — flag when the literal exceeds 16, or any `pow` call inside a `while` / `loop` / `vector::fold` body"
    - do_not_id: log-on-fractional-input
      pattern: "`.log2() | .log10() | .ln()` without a preceding `.gte(ud30x9::one())` guard"
      heuristic: "AST rule: the receiver of the log call has no upstream `assert!(x.gte(one()), _)` or `if (x.lt(one())) { ... } else { x.log*() }`"

