# Per-package index of AI integrator metadata for `openzeppelin_fp_math`.
# Lists every module YAML in this package's `llms/` directory. AI agents
# reading this can discover the package's full integrator-facing module
# surface in a single fetch, then drill into <path> for per-module schema
# metadata (APIs, errors, preconditions, integration patterns, anti-patterns,
# decision points).
#
# Private/internal helpers under `sources/internal/` are intentionally not
# listed — they are not part of the integrator-facing API.

schema_version: "1.0"
package: openzeppelin_fp_math
install:
  mvr: "@openzeppelin-move/fixed-point-math"
  repo_ref: 55a79713a7e51a142de017e57bd7901ce8198212
  release: null   # release tag this matches (null if extracted between tags); install.repo_ref is the actual pin
  move_toml_snippet: |
    [dependencies]
    openzeppelin_fp_math = { r.mvr = "@openzeppelin-move/fixed-point-math" }
  github_alternative: |
    # Uses TOML table-heading form (`[dependencies.name]`) — inline tables
    # cannot span multiple lines in TOML, so the heading form is the only
    # readable option with inline comments.
    [dependencies.openzeppelin_fp_math]
    git = "https://github.com/OpenZeppelin/contracts-sui.git"
    subdir = "math/fixed_point"
    rev = "<commit-sha-or-tag>"   # Agent fills in. Prefer the latest release tag for stable
                                  # builds; pin a SHA for audits; use a branch only during
                                  # active development. See `install.repo_ref` above for the
                                  # commit this metadata was extracted from.

modules:
  - name: ud30x9
    path: ud30x9/ud30x9.yaml
    summary: "Unsigned decimal fixed-point type `UD30x9` (9 decimals, `u128`-backed) — constants, constructors, raw `wrap`/`unwrap` casts."

  - name: ud30x9_base
    path: ud30x9/ud30x9_base.yaml
    summary: "Arithmetic, comparison, bitwise, and logarithm operations on `UD30x9`."

  - name: ud30x9_convert
    path: ud30x9/ud30x9_convert.yaml
    summary: "Scale-aware conversions between whole unsigned integers (`u8`–`u256`) and `UD30x9`."

  - name: sd29x9
    path: sd29x9/sd29x9.yaml
    summary: "Signed decimal fixed-point type `SD29x9` (9 decimals, magnitude + sign-flag API) — constants, constructors, raw `wrap`/`unwrap` casts."

  - name: sd29x9_base
    path: sd29x9/sd29x9_base.yaml
    summary: "Arithmetic, transcendental, and comparison operations on `SD29x9`."

  - name: sd29x9_convert
    path: sd29x9/sd29x9_convert.yaml
    summary: "Scale-aware conversions between whole signed magnitudes and `SD29x9`."
