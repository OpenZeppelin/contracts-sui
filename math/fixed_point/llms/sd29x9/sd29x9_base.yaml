    - do_not_id: confuse-rem-with-mod
      pattern: "Call to `sd29x9_base::rem` (or `<SD29x9>.rem`) in a context that hashes / indexes by residue (variable named `bucket`, `index`, `slot`, modular arithmetic), where the dividend is not provably non-negative."
      heuristic: "grep -nE '\\.rem\\(.*\\)' on .move files; flag if the surrounding 10 lines mention `index`, `bucket`, `slot`, `key`, `hash`."
    - do_not_id: min-without-guard
      pattern: "`abs` / `negate` / `sub` on an `SD29x9` value that is not freshly constructed via `from_u128` / `wrap(_, false)` and is not guarded by `eq(sd29x9::min())`."
      heuristic: "grep -nE '\\.(abs|negate)\\(\\)' on .move files; flag absence of a preceding `if (x.eq(sd29x9::min()))` branch on the same value."
    - do_not_id: raw-bit-comparison
      pattern: "Comparison operator (`<`, `>`, `<=`, `>=`) applied to expressions of the form `<sd29x9_value>.unwrap()`."
      heuristic: "grep -nE '\\.unwrap\\(\\).*(<|>|<=|>=)' on .move files; flag any match where both sides ultimately resolve to an SD29x9."
    - do_not_id: unchecked-without-bound-proof
      pattern: "`unchecked_add` / `unchecked_sub` on SD29x9 without a preceding `assert!` or range-check that bounds both operands."
      heuristic: "grep -nE '\\.(unchecked_add|unchecked_sub)\\(' on .move files; flag absence of `assert!` within the preceding 5 lines."

  events: []   # sd29x9_base emits no events. The `Components` struct has `copy, drop` only
                # (no `key` / `store`), so it is a value type, not an event — extractor's
                # EVENT|Components|neg,mag line is a false positive of the heuristic
                # (`public struct ... has copy, drop` matches the event regex).

  # ============================================================
  # Audit cross-reference — M2 of contracts-sui covered fp_math.
  # ============================================================
  # M-02 (callers see SD29x9 values, NOT raw u128 two's complement bits): the
  #   wrapping abstraction is preserved end-to-end in the public API. Every
  #   function above takes `SD29x9` (or `Option<SD29x9>`) and returns
  #   `SD29x9`. Raw `u128` bits only surface inside the private `decompose`
  #   and `wrapping_*_bits` helpers and via `sd29x9::from_bits` /
  #   `sd29x9::unwrap` (escape hatches documented in the wrapper module).
  #   Integrators MUST NOT compare `unwrap()`ed bits directly — see
  #   do_not[raw-bit-comparison].
  # H-01 (`u256::is_power_of_ten`) and L-04 (linear pow) — both findings
  #   apply to OTHER modules (`openzeppelin_math::u256` and the `pow`
  #   implementation respectively). `sd29x9_base::pow` delegates rounding
  #   semantics to fixed-point truncation per intermediate multiply and is
  #   discussed in its `notes:` block above (truncation bias, non-
  #   associativity, sign of result is `neg AND (exp odd)`).
